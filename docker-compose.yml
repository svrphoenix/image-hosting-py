services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./images:/images
      - ./logs:/logs
    restart: always
    depends_on:
      - postgres
  
  nginx:
    image: nginx:1.26-alpine
    ports:
      - "80:80" # http
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro # read only
      - ./frontend:/usr/share/nginx/html:ro
      - ./images:/var/www/images:ro
    restart: always
  
  postgres:
    image: postgres:17
    container_name: postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/1-init.sql:/docker-entrypoint-initdb.d/1-init.sql:ro

volumes:
  postgres_data:
