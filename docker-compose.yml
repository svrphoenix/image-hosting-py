services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./images:/images
      - ./logs:/logs
    restart: always
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:1.26-alpine
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./images:/var/www/images:ro
    restart: always

  postgres:
    image: postgres:17
    container_name: ${DB_CONTAINER_NAME}
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/1-init.sql:/docker-entrypoint-initdb.d/1-init.sql:ro
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data:
